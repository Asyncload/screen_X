name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Fix gradlew line endings
        run: sed -i 's/\r$//' gradlew

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ==============================================
      # 【前置】自增版本号 → 写入app/build.gradle.kts
      # ==============================================
      - name: Update the version number
        run: |
          echo "📝 build.gradle.kts中versionName行原始内容："
          grep versionName app/build.gradle.kts

          OLD_VER=$(grep versionName app/build.gradle.kts | awk '{print $NF}' | tr -d '"' | tr -d "'")
          echo "🔍 读取到旧版本号: $OLD_VER"

          V1=$(echo $OLD_VER | cut -d'.' -f1)
          V2=$(echo $OLD_VER | cut -d'.' -f2)
          V3=$(echo $OLD_VER | cut -d'.' -f3)
          
          V3=$((V3 + 1))
          if [ $V3 -ge 10 ]; then
            V3=0
            V2=$((V2 + 1))
            if [ $V2 -ge 10 ]; then
              V2=0
              V1=$((V1 + 1))
            fi
          fi
          NEW_VER="${V1}.${V2}.${V3}"
          echo "✅ 计算得到新版本号: $NEW_VER"

          sed -i "s/versionName\s*=\?\s*[\"'].*[\"']/versionName = \"${NEW_VER}\"/g" app/build.gradle.kts
          
          UPDATED_VER=$(grep versionName app/build.gradle.kts | awk '{print $NF}' | tr -d '"' | tr -d "'")
          if [ "$UPDATED_VER" != "$NEW_VER" ]; then
            echo "❗ 版本号写入失败！当前文件中的值: $UPDATED_VER"
            exit 1
          fi
          echo "✅ 版本号已成功写入build.gradle.kts"

          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H:%M:%S)

          echo "VERSION=$NEW_VER" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "BUILD_TIME=$TIME" >> $GITHUB_ENV

      # 正常编译（现在编译用的是【新版本号】）& 并清除缓存
      - name: Build Release APK
        run: ./gradlew clean assembleRelease --no-build-cache

      - name: signature key
        run: |
          keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
          -alias myalias -storepass password789 -keypass password789 \
          -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, S=Unknown, C=Unknown"

      - name: jarsigner signature APK
        run: |
          jarsigner -verbose \
            -keystore my-release-key.jks \
            -storepass password789 \
            -keypass password789 \
            -signedjar app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            myalias

      # ==============================================
      # 【后置】只保留：清理 + 重命名APK + 提交代码
      # ==============================================
      - name: Modify apk name + automatically push code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"

          git checkout -- gradlew
          rm -rf .gradle/ build/ my-release-key.jks

          NEW_NAME="X-screen_v${VERSION}_${DATE}.apk"
          mv app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/$NEW_NAME
          echo "APK_FILE=app/build/outputs/apk/release/$NEW_NAME" >> $GITHUB_ENV

          git add app/build.gradle.kts
          if ! git diff --cached --quiet; then
            git commit -m "chore: 自动迭代版本至 ${VERSION} [skip ci]"
            git push
            echo "✅ 版本号变更已提交并推送至仓库"
          else
            echo "⚠️ 无版本号变更，跳过提交"
          fi
       #发布apk文件
      - name: Upload Release APK
        uses: softprops/action-gh-release@v2
        with:
          name: "X-JT-v${{ github.run_number }} (v${{ env.VERSION }})"
          files: ${{ env.APK_FILE }}
          tag_name: "v${{ env.VERSION }}"
          body: |
            ✅ 编译完成！ 🎉🎉🎉
            📱 应用版本: v${{ env.VERSION }}
            📅 编译时间: ${{ env.DATE }} ${{ env.BUILD_TIME }}
            📦 构建编号: ${{ github.run_number }}
            🛠️ 功能: 解除某些APP屏蔽了截图权限。
          overwrite_files: true
