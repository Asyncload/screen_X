name: Build APK (FINAL NO WRAPPER)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Gradle (Fixed Version)
        run: |
          sudo apt update
          sudo apt install -y gradle=7.5.*
          gradle --version

      - name: Global Repo Fix
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Build APK
        run: gradle clean assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Forced-Screenshot-APK
          path: app/build/outputs/apk/release/*.apk
