name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Fix gradlew line endings
        run: sed -i 's/\r$//' gradlew

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew clean assembleRelease --no-build-cache

      - name: 生成临时签名密钥
        run: |
          keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
          -alias myalias -storepass password789 -keypass password789 \
          -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, S=Unknown, C=Unknown"

      - name: 用jarsigner签名APK
        run: |
          jarsigner -verbose \
            -keystore my-release-key.jks \
            -storepass password789 \
            -keypass password789 \
            -signedjar app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            myalias

      # 版本自增(带进位) + 重命名 + 自动提交（终极修复版，兼容所有格式）
      - name: 版本自增(带进位) + 重命名 + 自动提交
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"

          # 清理工作区，只保留签名好的APK
          git checkout -- gradlew
          rm -rf .gradle/ build/ my-release-key.jks

          # 【调试】打印原始行内容，方便排查格式问题
          echo "📝 build.gradle中versionName行原始内容："
          grep versionName app/build.gradle

          # 通用读取：兼容所有格式，提取纯数字版本号
          OLD_VER=$(grep versionName app/build.gradle | awk '{print $NF}' | tr -d '"' | tr -d "'")
          echo "🔍 读取到旧版本号: $OLD_VER"

          # 带进位计算新版本号：1.1.9 → 1.2.0 → 1.9.9 → 2.0.0
          V1=$(echo $OLD_VER | cut -d'.' -f1)
          V2=$(echo $OLD_VER | cut -d'.' -f2)
          V3=$(echo $OLD_VER | cut -d'.' -f3)
          
          V3=$((V3 + 1))
          if [ $V3 -ge 10 ]; then
            V3=0
            V2=$((V2 + 1))
            if [ $V2 -ge 10 ]; then
              V2=0
              V1=$((V1 + 1))
            fi
          fi
          NEW_VER="${V1}.${V2}.${V3}"
          echo "✅ 计算得到新版本号: $NEW_VER"

          # 【终极修复】通用替换命令，兼容所有Gradle版本号写法
          # 匹配：versionName "x.x.x" / versionName = "x.x.x" / versionName 'x.x.x'
          sed -i "s/versionName\s*=\?\s*[\"'].*[\"']/versionName = \"${NEW_VER}\"/g" app/build.gradle
          
          # 验证修改结果
          UPDATED_VER=$(grep versionName app/build.gradle | awk '{print $NF}' | tr -d '"' | tr -d "'")
          if [ "$UPDATED_VER" != "$NEW_VER" ]; then
            echo "❌ 版本号写入失败！当前文件中的值: $UPDATED_VER"
            exit 1
          fi
          echo "✅ 版本号已成功写入build.gradle"

          # 日期 + 带冒号时间
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H:%M:%S)

          # 注入全局环境变量
          echo "VERSION=$NEW_VER" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "BUILD_TIME=$TIME" >> $GITHUB_ENV

          # 重命名APK
          NEW_NAME="X-screen_v${NEW_VER}_${DATE}.apk"
          mv app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/$NEW_NAME
          echo "APK_FILE=app/build/outputs/apk/release/$NEW_NAME" >> $GITHUB_ENV

          # 条件提交：只有变更时才执行，避免无变更报错
          git add app/build.gradle
          if ! git diff --cached --quiet; then
            git commit -m "chore: 自动迭代版本至 ${NEW_VER} [skip ci]"
            git push
            echo "✅ 版本号变更已提交并推送至仓库"
          else
            echo "ℹ️ 无版本号变更，跳过提交"
          fi

      - name: Upload Release APK
        uses: softprops/action-gh-release@v2
        with:
          name: "X-screen-v${{ github.run_number }} (v${{ env.VERSION }})"
          files: ${{ env.APK_FILE }}
          tag_name: "v${{ env.VERSION }}"
          body: |
            ✅ 编译完成！
            📱 应用版本: v${{ env.VERSION }}
            📅 编译时间: ${{ env.DATE }} ${{ env.BUILD_TIME }}
            📦 构建编号: ${{ github.run_number }}
            🛠️ 功能: 解除某些APP屏蔽了截图权限。
          overwrite_files: true
